<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">ESISA Logo</title>
  <desc id="desc">Official-style ESISA logo with blue stripes and yellow hexagon</desc>

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fb2f2"/>
      <stop offset="100%" stop-color="#1e73be"/>
    </linearGradient>

    <linearGradient id="yellowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff36b"/>
      <stop offset="100%" stop-color="#f2df00"/>
    </linearGradient>

    <clipPath id="stripeArea">
      <rect x="170" y="30" width="560" height="460" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#stripeArea)">
    <rect x="170" y="30" width="560" height="460" fill="url(#blueGrad)"/>
    <g fill="#ffffff" opacity="0.78">
      <rect x="170" y="55" width="560" height="12"/>
      <rect x="170" y="83" width="560" height="12"/>
      <rect x="170" y="111" width="560" height="12"/>
      <rect x="170" y="139" width="560" height="12"/>
      <rect x="170" y="167" width="560" height="12"/>
      <rect x="170" y="195" width="560" height="12"/>
      <rect x="170" y="223" width="560" height="12"/>
      <rect x="170" y="251" width="560" height="12"/>
      <rect x="170" y="279" width="560" height="12"/>
      <rect x="170" y="307" width="560" height="12"/>
      <rect x="170" y="335" width="560" height="12"/>
      <rect x="170" y="363" width="560" height="12"/>
      <rect x="170" y="391" width="560" height="12"/>
      <rect x="170" y="419" width="560" height="12"/>
      <rect x="170" y="447" width="560" height="12"/>
    </g>
  </g>

  <polygon points="450,20 715,160 715,360 450,500 185,360 185,160" fill="url(#yellowGrad)"/>

  <text
    x="450"
    y="360"
    text-anchor="middle"
    fill="url(#blueGrad)"
    stroke="#1d6db2"
    stroke-width="2"
    font-size="250"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    letter-spacing="3"
  >ESISA</text>
</svg>
